---
# Jellyfin in a docker container

- name: jellyfin docker root present
  file: path={{ item }} state=directory
    owner=root group=docker mode='0750'
  with_items:
    - /srv/jellyfin

# Recursively set owner/group but not permissions.  Setting
# the mode with recurse sets all files to '0775' too
- name: jellyfin docker support dirs present with owner
  file: path={{ item }} state=directory
    owner="{{jellyfin_user}}"
    group="{{jellyfin_group}}"
    recurse=yes
  with_items:
    - "{{ jellyfin_cfgdir }}"
    - "{{ jellyfin_cachedir }}"

- name: jellyfin docker support dirs permissions
  file: path={{ item }} state=directory mode='0755' 
  with_items:
    - "{{ jellyfin_cfgdir }}"
    - "{{ jellyfin_cachedir }}"
    
- name: Get media user info
  ansible.builtin.getent:
    database: passwd
    
- name: Get media group info
  ansible.builtin.getent:
    database: group
    
- name: jellyfin docker config present
  template: src='{{ item }}.j2'
    dest='/srv/jellyfin/{{ item }}'
    owner=root group=docker mode='0644'
  with_items:
    - docker-compose.yml
  notify:
    - reload jellyfin

